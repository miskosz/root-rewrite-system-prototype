<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RRS Interpreter</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Root Rewrite System</h1>
        <fieldset id="lang-select">
          <label><input type="radio" name="lang" value="rrs1" checked> RRS1</label>
          <label><input type="radio" name="lang" value="rrs2"> RRS2</label>
        </fieldset>
      </header>
      <main>
        <div id="editor-pane">
          <div id="editor-wrapper">
            <pre id="highlight-layer" aria-hidden="true"><code id="highlight-code"></code></pre>
            <textarea id="source" spellcheck="false"></textarea>
          </div>
          <div id="controls">
            <button id="btn-parse">Load</button>
            <button id="btn-step" disabled>Step</button>
            <button id="btn-run" disabled>Run</button>
          </div>
        </div>
        <div id="resize-handle"></div>
        <div id="tree-pane">
          <div id="tree-container"></div>
        </div>
      </main>
      <div id="status-bar">Ready</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
